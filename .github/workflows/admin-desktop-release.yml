name: Admin Desktop Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publier les artefacts de mise a jour (latest.yml + exe)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: admin-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            admin/package-lock.json
            admin-desktop/package-lock.json

      - name: Install admin deps
        run: npm ci
        working-directory: admin

      - name: Install desktop deps
        run: npm ci

      - name: Build desktop (no publish)
        if: inputs.publish == 'false'
        run: npm run release:win
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build + publish update assets
        if: inputs.publish == 'true'
        run: npm run release:publish
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-desktop-release
          path: admin-desktop/release/*
